<style>

  :root {
    --ca-dark:   #004E7D;
    --ca-mid:    #468AC9;
    --ca-yellow: #FFCE02;
    --ca-gray:   #433e43;
    --bg:        #f5f4f0;
    --surface:   #ffffff;
    --border:    rgba(0,0,0,0.09);
    --text:      #1a1a1a;
    --muted:     #6b6b6b;
    --danger:    #c0392b;
    --success:   #1a7a4a;
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
    --radius:    12px;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;

  .header {
    background: var(--ca-dark);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 11px; }
  .header-logo {
    width: 34px; height: 34px;
    background: var(--ca-yellow);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; color: var(--ca-dark);
    letter-spacing: 0.02em; flex-shrink: 0;

  .header-sub   { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 1px; }

  .content { max-width: 860px; margin: 0 auto; padding: 22px 18px 48px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 15px; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .metric-value { font-size: 24px; font-weight: 500; color: var(--ca-dark); line-height: 1; }
  .metric-value.sm { font-size: 17px; padding-top: 3px; }

  .status-banner { border-radius: var(--radius); padding: 13px 16px; margin-bottom: 14px; border-left: 4px solid; }
  .status-banner.single { background: #e8f2fb; border-color: var(--ca-dark); }
  .status-banner.open   { background: #fef3e2; border-color: #d4850a; }
  .status-banner.forks  { background: #fdecea; border-color: var(--danger); }
  .status-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .status-banner.single .status-label { color: var(--ca-dark); }
  .status-banner.open   .status-label { color: #a86200; }
  .status-banner.forks  .status-label { color: var(--danger); }
  .status-desc { font-size: 14px; color: var(--text); }

  .target-box {
    background: var(--surface); border: 2px solid var(--ca-mid);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px;
  }
  .target-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ca-mid); margin-bottom: 5px; }
  .target-name  { font-size: 28px; font-weight: 500; color: var(--ca-dark); }

  .code-display {
    background: var(--ca-dark); color: var(--ca-yellow);
    font-family: var(--mono); font-size: 26px; letter-spacing: 0.2em;
    text-align: center; padding: 16px; border-radius: var(--radius-sm);
    margin-bottom: 14px; font-weight: 500;
  }

  .prog-wrap { background: #e8edf2; border-radius: 6px; height: 7px; overflow: hidden; margin-top: 8px; }
  .prog-fill  { height: 100%; background: var(--ca-dark); border-radius: 6px; transition: width 0.5s ease; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    font-size: 14px; font-weight: 500; font-family: var(--font);
    cursor: pointer; transition: all 0.15s;
    background: var(--surface); color: var(--text); white-space: nowrap;
  }
  .btn:hover  { background: #f0f0ec; }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--ca-dark); color: #fff; border-color: var(--ca-dark); }
  .btn.primary:hover { background: #003d63; }
  .btn.yellow  { background: var(--ca-yellow); color: var(--ca-dark); border-color: var(--ca-yellow); }
  .btn.yellow:hover { background: #f0c000; }
  .btn.danger  { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn.danger:hover { background: #a93226; }
  .btn.sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  input[type=text], input[type=password] {
    width: 100%; padding: 10px 13px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 15px; font-family: var(--font);
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--ca-mid); }
  input.mono { font-family: var(--mono); letter-spacing: 0.12em; text-align: center; font-size: 18px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .input-row input { flex: 1; }

  .login-wrap {
    min-height: calc(100vh - 62px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 34px 36px; width: 100%; max-width: 360px;
  }
  .login-logo {
    width: 54px; height: 54px; background: var(--ca-dark);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: var(--ca-yellow);
    letter-spacing: 0.04em; margin: 0 auto 18px;
  }
  .login-title { text-align: center; font-size: 20px; font-weight: 500; margin-bottom: 3px; }
  .login-sub   { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 26px; }
  .mode-tabs   { display: flex; gap: 5px; margin-bottom: 22px; }
  .mode-tab {
    flex: 1; padding: 7px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); font-size: 13px; font-weight: 400;

  .form-label { font-size: 13px; color: var(--muted); margin-bottom: 5px; display: block; }
  .login-btn {
    width: 100%; padding: 11px; background: var(--ca-dark); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 500; cursor: pointer; font-family: var(--font);
    transition: background 0.15s;

  .login-btn:hover { background: #003d63; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error { font-size: 13px; color: var(--danger); text-align: center; margin-top: 10px; min-height: 18px; }

  .admin-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.12); border-radius: 9px; padding: 3px; }
  .admin-tab {
    padding: 5px 14px; border-radius: 7px; font-size: 13px;
    border: none; cursor: pointer; font-family: var(--font);
    background: transparent; color: rgba(255,255,255,0.65); transition: all 0.15s;

  .admin-tab:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.15); }

  .col-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
  }
  .player-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .player-row:last-child { border-bottom: none; }
  .pn { flex: 1.6; font-weight: 500; color: var(--text); }
  .pt { flex: 1.6; color: var(--muted); }
  .pc { flex: 1; font-family: var(--mono); font-size: 12px; color: var(--ca-mid); }
  .pk { flex: 0.4; text-align: center; color: var(--muted); }
  .ps { flex: 0.7; }
  .pa { flex: 1.6; display: flex; gap: 4px; flex-wrap: wrap; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge.active { background: #e0f3e8; color: #1a7a4a; }
  .badge.elim   { background: #fdecea; color: var(--danger); }

  .status-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .status-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 13px;
    border: 1px solid var(--border); cursor: pointer;
    background: #f0f0ec; color: var(--muted); font-family: var(--font); transition: all 0.15s;

  .status-btn.sel-single { background: #e8f2fb; color: var(--ca-dark); border-color: var(--ca-mid); font-weight: 500; }
  .status-btn.sel-open   { background: #fef3e2; color: #a86200; border-color: #d4850a; font-weight: 500; }
  .status-btn.sel-forks  { background: #fdecea; color: var(--danger); border-color: var(--danger); font-weight: 500; }

  .print-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .pc-header { background: var(--ca-dark); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
  .pc-school { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.05em; text-transform: uppercase; }
  .pc-game   { font-size: 14px; font-weight: 500; color: #fff; }
  .pc-year   { font-size: 11px; color: var(--ca-yellow); }
  .pc-body   { padding: 14px 16px; display: flex; gap: 12px; align-items: center; }
  .pc-info   { flex: 1; }
  .pc-name   { font-size: 18px; font-weight: 500; color: var(--ca-dark); margin-bottom: 8px; }
  .pc-code-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }

  .forks-stat-label { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 3px; }

  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);

  .elim-icon  { font-size: 44px; margin-bottom: 12px; }
  .elim-title { font-size: 24px; font-weight: 500; color: var(--danger); margin-bottom: 6px; }

  .add-row { display: flex; gap: 8px; margin-top: 12px; }

  .empty { text-align: center; padding: 20px; font-size: 13px; color: var(--muted); }

  @media (max-width: 600px) {
    .pc { display: none; } .pk { display: none; }

    .login-card { padding: 28px 22px; }

  /* ── SPOON ICONS ── */
  .spoon-icons { display: flex; gap: 5px; align-items: center; }
  .spoon-svg { cursor: pointer; transition: transform 0.15s; user-select: none; display: inline-block; }
  .spoon-svg:hover { transform: scale(1.15); }
  .spoon-svg .spoon-path { fill: #FFCE02; transition: fill 0.2s; }
  .spoon-svg.used .spoon-path { fill: #d0d0d0; }

  .elim-killer { font-weight: 500; color: var(--ca-dark); }

  .rules-list { list-style: none; padding: 0; }
  .rules-list li { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.6; color: var(--text); display: flex; gap: 10px; }
  .rules-list li:last-child { border-bottom: none; }

  .board-tagline { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 14px; line-height: 1.6; }
  .sggb-badge { display: inline-block; background: var(--ca-yellow); color: var(--ca-dark); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.04em; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; text-align: center; }
  .stat-card-value { font-size: 28px; font-weight: 500; color: var(--ca-dark); line-height: 1; margin-bottom: 4px; }
  .stat-card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  @media print {
    .header, .no-print { display: none !important; }
    .print-grid { grid-template-columns: repeat(2, 1fr); }
    .player-card { break-inside: avoid; }
    body { background: white; }
  }
</style>

// ── ADMIN EDGE FUNCTION CALLER ──
const EDGE_FN_URL = 'https://hjlonriesoousgwsdysj.supabase.co/functions/v1/admin-action';

async function adminCall(action, payload) {
  const passwordHash = STATE.adminPasswordHash;
  const res = await fetch(EDGE_FN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },

// ── CRYPTO: hash password in the browser using SubtleCrypto ──
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword(key, plaintext) {
  const hash = await sha256hex(plaintext);
  const { data, error } = await sb.from('passwords').select('hash').eq('key', key).single();
  if (error || !data) return false;
  return data.hash === hash;
}

// ── HELPERS ──
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function activePlayers() { return STATE.players.filter(p => p.active); }
function pct() {
  if (!STATE.players.length) return 0;
  return Math.round((activePlayers().length / STATE.players.length) * 100);
}
function getTarget(player) {
  return STATE.players.find(p => p.id === player.target_id) || null;
}

async function submitKillCode(code) {
  const trimmed = code.trim().toUpperCase();

  const victimRes = await fetch('https://hjlonriesoousgwsdysj.supabase.co/functions/v1/admin-action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
    body: JSON.stringify({ action: 'lookupCode', payload: { code: trimmed }, passwordHash: 'player' })
  });
  const victimData = await victimRes.json();
  const errorMsg = enforcePasswordRateLimit(victimRes.ok && !victimData.error && victimData.player);
  if (errorMsg != null) {
    showToast(errorMsg);
    return;
  }
  const victim = victimData.player;
  const killer = STATE.currentPlayer;
  if (killer.id === victim.id) { showToast("That's your own code!"); return; }
  if (STATE.gameStatus !== 'open' && killer.target_id !== victim.id) {
    showToast('That is not your current target'); return;
  }
  try {
    // playerEliminate sets manual=false so it counts on the leaderboard
    const result = await fetch('https://hjlonriesoousgwsdysj.supabase.co/functions/v1/admin-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({
        action: 'playerEliminate',
        payload: { victimId: victim.id, killerId: killer.id },
        passwordHash: 'player'
      })
    });
    const data = await result.json();
    if (!result.ok || data.error) { showToast('Error: ' + (data.error || 'Unknown error')); return; }
    // Refresh current player data
    // Refresh current player via Edge Function
    const refreshRes = await fetch('https://hjlonriesoousgwsdysj.supabase.co/functions/v1/admin-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ action: 'playerLogin', payload: { id: killer.id }, passwordHash: 'player' })
    });
    const refreshData = await refreshRes.json();
    if (!refreshData.error) STATE.currentPlayer = refreshData.player;
    await loadEliminations();
    STATE.killCodeInput = '';
    showToast('Target eliminated!');
    render();
  } catch(e) { showToast('Error: ' + e.message); }

const MAX_LOGIN_ATTEMPTS = 10;
const PASSWORD_TIMEOUT_SECS = 300.0;

function resetLoginState() {
  window.localStorage.setItem("CASpoonGame_LoginAttempts", "1");
  window.localStorage.setItem("CASpoonGame_LastLoginTime", new Date().toString());
}

function enforcePasswordRateLimit(passwordCorrect) {
  const lastLoginTimeStr = window.localStorage.getItem("CASpoonGame_LastLoginTime");
  let loginAttempts = parseInt(window.localStorage.getItem("CASpoonGame_LoginAttempts"));
  if (Number.isNaN(loginAttempts) || lastLoginTimeStr == null) {
    resetLoginState();
    return passwordCorrect ? null : 'Your code/password is incorrect.';
  } 
  const timeRemaining = PASSWORD_TIMEOUT_SECS - Math.abs(new Date() - new Date(lastLoginTimeStr)) / 1000.0;
  if (timeRemaining > 0 && loginAttempts > MAX_LOGIN_ATTEMPTS) {
    return 'Try again in ' + timeRemaining.toString() + ' seconds';
  } else if (passwordCorrect) {
    resetLoginState();
    return null;
  } else {
    window.localStorage.setItem("CASpoonGame_LoginAttempts", (loginAttempts + 1).toString());
    window.localStorage.setItem("CASpoonGame_LastLoginTime", new Date().toString());
    return loginAttempts + 1 > MAX_LOGIN_ATTEMPTS 
      ? 'Lmao, stop hacking. You are in timeout for 5 min.'
      : 'Your code/password is incorrect.';
  }
}

function sortBy(col) {
  if (STATE.adminSortCol === col) {
    STATE.adminSortDir = STATE.adminSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.adminSortCol = col;
    STATE.adminSortDir = 'asc';

function sortedPlayers(killCounts) {
  const col = STATE.adminSortCol;
  const dir = STATE.adminSortDir === 'asc' ? 1 : -1;
  return [...STATE.players].sort((a, b) => {
    let av, bv;
    switch (col) {
      case 'name':    av = a.name.toLowerCase();       bv = b.name.toLowerCase();       break;
      case 'target':  av = (STATE.players.find(p=>p.id===a.target_id)?.name||'').toLowerCase();
                      bv = (STATE.players.find(p=>p.id===b.target_id)?.name||'').toLowerCase(); break;
      case 'code':    av = a.code;                     bv = b.code;                     break;
      case 'elim':    av = killCounts[a.name]||0;      bv = killCounts[b.name]||0;      break;
      case 'spoons':  av = a.spoons_remaining??3;      bv = b.spoons_remaining??3;      break;
      case 'status':  av = a.active?1:0;               bv = b.active?1:0;               break;
      default:        av = a.name.toLowerCase();       bv = b.name.toLowerCase();
    }
    if (av < bv) return -1 * dir;
    if (av > bv) return  1 * dir;
    return 0;
  });
}

function toggleSpoon(playerId, currentSpoons, spoonIndex) {
  // Use bitmask: bit 0 = spoon 1, bit 1 = spoon 2
  // So: 0=both used, 1=spoon1 only, 2=spoon2 only, 3=both intact
  const val = currentSpoons === null || currentSpoons === undefined ? 3 : currentSpoons;
  const bit = spoonIndex === 1 ? 1 : 2;
  const newVal = (val & bit) ? (val & ~bit) : (val | bit);
  updateSpoons(playerId, newVal);
}

// ── CSV IMPORT ──
function triggerImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv';
  input.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      parseAndImportCSV(ev.target.result);
    };
    reader.readAsText(file);
  });
  input.click();
}

function parseAndImportCSV(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) { showToast('CSV appears empty'); return; }

  // Detect header row
  const header = lines[0].toLowerCase().replace(/"/g, '');
  const cols = header.split(',').map(c => c.trim());
  const nameIdx  = cols.findIndex(c => c.includes('name'));
  const emailIdx = cols.findIndex(c => c.includes('email'));

  if (nameIdx === -1) { showToast('CSV must have a Name column'); return; }

  if (emailIdx === -1) { showToast('CSV must have an Email column'); return; }

  const newPlayers = [];
  const skipped = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
    const name  = vals[nameIdx]  || '';
    const email = (vals[emailIdx] || '').trim().toLowerCase();
    if (!name || !email) continue;
    // Skip if email already exists
    if (STATE.players.find(p => p.email && p.email.toLowerCase() === email)) {
      skipped.push(name);
      continue;
    }
    newPlayers.push({ name, email, code: genCode(), kills: 0, active: true });
  }

  if (newPlayers.length === 0) {
    showToast('No new players found' + (skipped.length ? ' (' + skipped.length + ' already exist)' : ''));
    return;
  }

  const skipMsg = skipped.length ? '\n\nSkipping ' + skipped.length + ' already existing: ' + skipped.join(', ') : '';
  if (!window.confirm('Import ' + newPlayers.length + ' new players?' + skipMsg + '\n\n' + newPlayers.map(p => p.name + ' (' + p.email + ')').join('\n'))) return;

  importPlayers(newPlayers);
}

async function importPlayers(players) {
  showToast('Importing ' + players.length + ' players...');
  try {
    await adminCall('importPlayers', { players });
    await loadAll();
    showToast('Imported ' + players.length + ' players successfully');
    render();
  } catch(e) { showToast('Import error: ' + e.message); }
}

function sortArrow(col) {
  if (STATE.adminSortCol !== col) return '<span style="color:var(--color-border-secondary);margin-left:3px;">⇅</span>';
  return STATE.adminSortDir === 'asc'
    ? '<span style="color:var(--ca-dark);margin-left:3px;">↑</span>'
    : '<span style="color:var(--ca-dark);margin-left:3px;">↓</span>';
}

async function refreshPlayerView() {
  const res = await fetch('https://hjlonriesoousgwsdysj.supabase.co/functions/v1/admin-action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
    body: JSON.stringify({
      action: 'playerLogin',
      payload: { id: STATE.currentPlayer.id },
      passwordHash: 'player'
    })
  });
  const data = await res.json();
  if (!data.error) STATE.currentPlayer = data.player;
  if (data.gameStatus) STATE.gameStatus = data.gameStatus;
  const { data: players } = await sb.from('public_players').select('id, name, active').order('name');
  if (players) STATE.players = players;
  await loadEliminations();
  render();
}

function renderReports() {
  const active   = STATE.players.filter(p => p.active);
  const eliminated = STATE.players.filter(p => !p.active);

  const fromDate = STATE.reportDateFrom ? new Date(STATE.reportDateFrom + 'T00:00:00') : null;
  const toDate   = STATE.reportDateTo   ? new Date(STATE.reportDateTo   + 'T23:59:59') : null;
  const filteredElim = STATE.eliminations.filter(e => {
    const d = new Date(e.created_at);
    if (fromDate && d < fromDate) return false;
    if (toDate   && d > toDate)   return false;
    return true;
  });

  const pTable = (players) => {
    if (!players.length) return '<div class="empty">No players in this category.</div>';
    const cols = 3;
    const rows = Math.ceil(players.length / cols);
    // Build cols arrays: numbers go down each column sequentially
    const columns = Array.from({length: cols}, (_, c) =>
      players.slice(c * rows, (c + 1) * rows)
        .map((p, r) => ({ p, num: c * rows + r + 1 }))
    );
    let html = '<div style="display:grid;grid-template-columns:repeat(' + cols + ',1fr);gap:0;align-items:start;">';
    for (let c = 0; c < cols; c++) {
      html += '<div>';
      for (let r = 0; r < rows; r++) {
        const entry = columns[c][r];
        if (!entry) {
          html += '<div style="padding:6px 10px;border-bottom:1px solid var(--border);"></div>';
        } else {
          html += '<div style="display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);background:' + (r%2===0?'var(--color-background-secondary)':'var(--surface)') + '">'
            + '<span style="width:28px;color:var(--muted);font-size:12px;">' + entry.num + '</span>'
            + '<span style="font-weight:500;font-size:13px;">' + entry.p.name + '</span>'
            + '</div>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  };

  const eTable = (elims) => {
    if (!elims.length) return '<div class="empty">No eliminations in this range.</div>';
    return '<table style="width:100%;border-collapse:collapse;font-size:13px;">'
      + '<thead><tr>'
      + '<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Eliminated</th>'
      + '<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Spooned by</th>'
      + '<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Type</th>'
      + '<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Date &amp; time</th>'
      + '</tr></thead><tbody>'
      + elims.map((e,i) =>
          '<tr style="background:' + (i%2===0?'var(--color-background-secondary)':'var(--surface)') + '">'
          + '<td style="padding:7px 10px;font-weight:500;color:var(--danger);">' + e.victim_name + '</td>'
          + '<td style="padding:7px 10px;font-weight:500;color:var(--ca-dark);">' + e.killer_name + '</td>'
          + '<td style="padding:7px 10px;"><span class="badge ' + (e.manual?'elim':'active') + '">' + (e.manual?'admin':'player') + '</span></td>'
          + '<td style="padding:7px 10px;color:var(--muted);">' + new Date(e.created_at).toLocaleString() + '</td>'
          + '</tr>'
        ).join('')
      + '</tbody></table>';
  };

  return '<div class="card">'
    + '<div class="card-label">Active players — ' + active.length + ' still in game</div>'
    + pTable(active)
    + '</div>'
    + '<div class="card">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;">'
    + '<div class="card-label" style="margin-bottom:0;">Eliminations by date range — ' + filteredElim.length + ' result' + (filteredElim.length!==1?'s':'') + '</div>'
    + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
    + '<label style="font-size:12px;color:var(--muted);">From</label>'
    + '<input type="date" value="' + STATE.reportDateFrom + '" oninput="STATE.reportDateFrom=this.value;render()" style="font-size:12px;padding:5px 8px;">'
    + '<label style="font-size:12px;color:var(--muted);">To</label>'
    + '<input type="date" value="' + STATE.reportDateTo + '" oninput="STATE.reportDateTo=this.value;render()" style="font-size:12px;padding:5px 8px;">'
    + '<button class="btn sm" onclick="STATE.reportDateFrom=\'\';STATE.reportDateTo=\'\';render()">Clear</button>'
    + '</div></div>'
    + eTable(filteredElim)
    + '</div>'
    + '<div class="card">'
    + '<div class="card-label">All eliminated players — ' + eliminated.length + ' total</div>'
    + pTable([...eliminated].reverse())
    + '</div>';
}

      ${STATE.forks.length === 0 ? `<div class="empty">No forks added yet.</div>` : ''}
      <div class="add-row">
        <input type="text" placeholder="Fork name (e.g. Ms. Thompson)" value="${STATE.forkInputName}"
          oninput="STATE.forkInputName=this.value" onkeydown="if(event.key==='Enter')addFork()">
        <button class="btn primary" onclick="addFork()">Add fork</button>
      </div>
    </div>`;
}

function renderForks() {
  const active = STATE.players.filter(p => p.active);
  return `
    <div class="forks-wrap">
      ${headerHTML('Fork View — Spoon Game 2026', signOutBtn())}
      <div class="forks-content">
        <div class="forks-stats">
          <div class="forks-stat"><div class="forks-stat-num">${active.length}</div><div class="forks-stat-label">Players still in</div></div>
          <div class="forks-stat"><div class="forks-stat-num">${pct()}%</div><div class="forks-stat-label">Remaining</div></div>
          <div class="forks-stat"><div class="forks-stat-num">${STATE.players.length - active.length}</div><div class="forks-stat-label">Eliminated</div></div>
        </div>
        <div class="forks-prog"><div class="forks-prog-fill" style="width:${pct()}%"></div></div>
        <div class="forks-section-label">All players</div>
        <div class="forks-grid">
          ${STATE.players.map(p => `
            <div class="fork-tile ${p.active?'':'out'}">
              <div class="fork-tile-name">${p.name}</div>
              <div class="fork-tile-status ${p.active?'alive':'out'}">${p.active?'In game':'Eliminated'}</div>
            </div>
          `).join('')}
        </div>
        ${STATE.forks.length > 0 ? `
          <div class="forks-section-label">Active forks</div>
          <div class="forks-grid">
            ${STATE.forks.map(f => `
              <div class="fork-tile">
                <div class="fork-tile-name">${f.name}</div>
                <div class="fork-tile-status alive">Fork · active</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
        <div style="text-align:center;margin-top:16px;">
          <button class="btn sm" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2);" onclick="refreshForkView()">Refresh</button>
        </div>
      </div>
    </div>`;
}

async function refreshForkView() {
  await loadPublic();
  render();
}

function generateQRCodes() {
  if (typeof QRCode === 'undefined') return;
  STATE.players.forEach(p => {
    const el = document.getElementById('qr-' + p.id);
    if (el && !el.hasChildNodes()) {
      try {
        new QRCode(el, { text: APP_URL, width: 76, height: 76, colorDark: '#004E7D', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
      } catch(e) {}
    }
  });
}

// ── BOOT ──
(async () => {
  STATE.view = 'loading';
  render();
  await Promise.all([
    loadEliminations(),
    sb.from('public_players').select('id, name, active').order('name').then(({ data }) => {
      if (data) STATE.players = data;
    }),
    sb.from('game_state').select('status').eq('id', 1).single().then(({ data }) => {
      if (data) STATE.gameStatus = data.status;
    }),
    new Promise(r => setTimeout(r, 300)),
  ]);
  STATE.view = 'login';
  render();
})();
</script>
</body>
</html>
